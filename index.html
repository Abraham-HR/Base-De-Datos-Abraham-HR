<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ABRAHAM GOD SYSTEM v3.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
  :root { --green:#00ff41; --green-dim:#00aa2a; --bg:#020c02; --scanline:rgba(0,255,65,0.03); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--green); font-family:'Share Tech Mono',monospace; font-size:14px; min-height:100vh; overflow-x:hidden; }
  body::before { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px); pointer-events:none; z-index:999; }
  body::after  { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.85) 100%); pointer-events:none; z-index:998; }
  #terminal { padding:20px 24px; min-height:100vh; max-width:920px; margin:0 auto; }
  .line { line-height:1.7; word-break:break-word; animation:fadeIn .08s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .dim    { color:var(--green-dim); }
  .bright { color:#afffbe; text-shadow:0 0 8px var(--green); }
  .error  { color:#ff3333; text-shadow:0 0 8px #ff000055; }
  .success{ color:#00ff99; text-shadow:0 0 8px #00ff9955; }
  .warn   { color:#ffcc00; }
  .cyan   { color:#00ffff; text-shadow:0 0 6px #00ffff88; }
  .ascii  { color:var(--green); text-shadow:0 0 12px var(--green); white-space:pre; font-family:'VT323',monospace; font-size:17px; line-height:1.2; }
  .prompt-line { display:flex; align-items:center; gap:6px; margin-top:4px; }
  .prompt-symbol { color:var(--green); text-shadow:0 0 8px var(--green); user-select:none; }
  #cmd-input { background:transparent; border:none; color:var(--green); font-family:'Share Tech Mono',monospace; font-size:14px; outline:none; flex:1; caret-color:var(--green); text-shadow:0 0 6px var(--green); }
  .tag { display:inline-block; border:1px solid var(--green-dim); padding:0 5px; font-size:11px; color:var(--green-dim); margin-right:4px; }
  .glitch { animation:glitch .3s linear; }
  @keyframes glitch { 0%{transform:translateX(0);filter:none} 20%{transform:translateX(-3px);filter:hue-rotate(90deg)} 40%{transform:translateX(3px);filter:hue-rotate(-90deg)} 60%{transform:translateX(-2px)} 80%{transform:translateX(2px)} 100%{transform:translateX(0);filter:none} }
  table { border-collapse:collapse; width:100%; margin:8px 0; font-size:12px; }
  td,th { border:1px solid var(--green-dim); padding:4px 8px; text-align:left; }
  th { background:rgba(0,255,65,.08); color:#afffbe; text-shadow:0 0 6px var(--green); }
  tr:hover td { background:rgba(0,255,65,.05); }
  /* Map */
  .map-box { width:100%; height:240px; border:1px solid var(--green-dim); margin:8px 0; position:relative; overflow:hidden; background:#010e01; }
  .map-grid { width:100%; height:100%; background-image:linear-gradient(rgba(0,255,65,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,.07) 1px,transparent 1px); background-size:30px 30px; position:relative; }
  .map-dot { position:absolute; width:12px; height:12px; background:var(--green); border-radius:50%; box-shadow:0 0 16px var(--green),0 0 32px var(--green); animation:ping 1.5s ease-out infinite; top:50%; left:50%; transform:translate(-50%,-50%); }
  @keyframes ping { 0%{box-shadow:0 0 0 0 rgba(0,255,65,.7),0 0 8px var(--green)} 70%{box-shadow:0 0 0 20px rgba(0,255,65,0),0 0 16px var(--green)} 100%{box-shadow:0 0 0 0 rgba(0,255,65,0),0 0 8px var(--green)} }
  .map-label { position:absolute; top:8px; left:8px; font-size:11px; color:var(--green-dim); }
  .map-coords { position:absolute; bottom:8px; right:8px; font-size:10px; color:var(--green-dim); }
  .map-ch-h { position:absolute; width:100%; height:1px; top:50%; left:0; background:rgba(0,255,65,.15); }
  .map-ch-v { position:absolute; width:1px; height:100%; left:50%; top:0; background:rgba(0,255,65,.15); }
  /* Game */
  .hack-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:3px; margin:8px 0; max-width:340px; }
  .hack-cell { border:1px solid var(--green-dim); padding:4px 0; text-align:center; font-size:12px; cursor:pointer; transition:all .15s; }
  .hack-cell:hover { background:rgba(0,255,65,.15); }
  .hack-cell.hit  { background:rgba(0,255,65,.3); color:#fff; text-shadow:0 0 6px var(--green); }
  .hack-cell.miss { background:rgba(255,50,50,.2); color:#ff5555; }
  /* Chat */
  .chat-bubble { margin:4px 0 4px 12px; padding:6px 10px; border-left:2px solid var(--green-dim); color:#afffbe; font-size:13px; line-height:1.5; }
  /* Crypto */
  .crypto-card { display:inline-block; border:1px solid var(--green-dim); padding:6px 12px; margin:4px 4px 0 0; font-size:13px; min-width:130px; }
  .crypto-up   { color:#00ff99; }
  .crypto-down { color:#ff5555; }
  /* Playlist */
  .pl-item { padding:3px 0; cursor:pointer; }
  .pl-item:hover { color:#afffbe; text-shadow:0 0 6px var(--green); }
  .pl-item.playing { color:#00ff99; }
  /* Files */
  .file-dir  { color:#00ffff; text-shadow:0 0 4px #00ffff66; }
  .file-file { color:var(--green-dim); }
  /* Network */
  .node-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); margin-right:6px; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>

const sleep = ms => new Promise(r => setTimeout(r, ms));

function addLine(html, cls="line") {
  const d = document.createElement("div");
  d.className = cls; d.innerHTML = html;
  terminal.appendChild(d);
  terminal.scrollTop = terminal.scrollHeight;
  return d;
}
async function print(html, delay=30, cls="line") {
  await sleep(delay); return addLine(html, cls);
}
async function progressBar(label, steps=20, delay=38) {
  const d = addLine(`<span class="dim">${label} [<span id="pb_i"></span>]</span>`);
  const pb = d.querySelector("#pb_i");
  let bar = "";
  for (let i=0; i<steps; i++) { bar+="█"; pb.textContent=bar; await sleep(delay); }
  d.innerHTML = `<span class="dim">${label} [</span><span class="success">${"█".repeat(steps)}</span><span class="dim">] DONE</span>`;
}
function getInput(prompt="► ", masked=false) {
  return new Promise(resolve => {
    const line = document.createElement("div");
    line.className = "prompt-line";
    line.innerHTML = `<span class="prompt-symbol">${prompt}</span>`;
    const inp = document.createElement("input");
    inp.type = masked ? "password" : "text";
    inp.autocomplete="off"; inp.spellcheck=false;
    Object.assign(inp.style, { background:"transparent", border:"none", color:"var(--green)", fontFamily:"'Share Tech Mono',monospace", fontSize:"14px", outline:"none", flex:"1", caretColor:"var(--green)", textShadow:"0 0 6px var(--green)" });
    line.appendChild(inp); terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
    setTimeout(() => inp.focus(), 40);
    inp.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const val = inp.value;
        inp.disabled = true; inp.style.color="var(--green-dim)";
        resolve(val);
      }
    });
  });
}
function randOctet()  { return Math.floor(Math.random()*254+1); }
function randMAC()    { return Array.from({length:6},()=>Math.floor(Math.random()*256).toString(16).padStart(2,"0")).join(":"); }
function barStr(pct, total=28) {
  const f = Math.min(Math.round((pct/100)*total), total);
  return "[" + "█".repeat(f) + "░".repeat(total-f) + "]";
}

// 3. BASE DE DATOS
async function cmdDatabase() {
  await print(`<span class="dim">[ DB ] Conectando al servidor...</span>`);
  await progressBar("Autenticando  ", 14, 40);
  await print(`<span class="success">► Conexión establecida — 3 tablas disponibles</span>`);
  const datasets = [
    {name:"TABLA_ALFA",rows:genRows(7)},{name:"TABLA_BETA",rows:genRows(5)},{name:"TABLA_GAMMA",rows:genRows(4)}
  ];
  for (const ds of datasets) {
    await print(`<br><span class="dim">── ${ds.name} ──────────────────────</span>`);
    const t = document.createElement("table");
    t.innerHTML = `<tr><th>#</th><th>Nombre</th><th>Ciudad</th><th>País</th><th>Red</th><th>IP</th></tr>`;
    for (const r of ds.rows) {

      t.appendChild(tr);

    terminal.appendChild(t); terminal.scrollTop=terminal.scrollHeight; await sleep(60);

}
function genRows(n) {
  const N=["Juan","Ana","Luis","Carlos","Sofía","Emma","Noah","Liam","Mía","Lucas","Elena","Omar","Valeria","Diego","Sara"];
  const C=["Monterrey","CDMX","Guadalajara","Bogotá","Lima","Santiago","Madrid","Miami","Houston","Austin"];
  const P=["México","Colombia","Perú","Chile","España","EUA","Argentina","Brasil"];
  return Array.from({length:n},(_,i)=>({
    id:String(i+1).padStart(3,"0"),
    nombre:N[Math.floor(Math.random()*N.length)]+" "+String.fromCharCode(65+Math.floor(Math.random()*26))+".",
    ciudad:C[Math.floor(Math.random()*C.length)], pais:P[Math.floor(Math.random()*P.length)],
    red:`@usr${Math.floor(Math.random()*9999)}`,
    ip:`${randOctet()}.${randOctet()}.${randOctet()}.${randOctet()}`
  }));
}

// 4. PLAYLIST
async function cmdPlaylist() {
  await print(`<span class="dim">[ MÚSICA ] Playlist del sistema — ${PLAYLIST.length} pistas</span><br>`);
  PLAYLIST.forEach((t,i) => {
    const d = document.createElement("div");
    d.className="line pl-item"+(i===currentTrack?" playing":"");
    d.innerHTML=`  <span class="dim">[${String(i+1).padStart(2)}]</span>  ${i===currentTrack?"<span class='success'>▶</span> ":"   "}<span>${t.title}</span>`;
    d.onclick = () => playTrack(i);
    terminal.appendChild(d);
  });
  await print(`<br><span class="dim">  P=Play/Pause  N=Siguiente  B=Anterior  ENTER=Salir</span>`);
  await print(`<span class="dim">  (También puedes hacer clic en una pista)</span>`);
  let done=false;
  while(!done) {
    const cmd=(await getInput("🎵 ")).toUpperCase().trim();
    if (cmd==="P") {
      if (!musicPlaying) await playTrack(currentTrack);
      else { audioPlayer.pause(); musicPlaying=false; await print(`<span class="warn">⏸ Pausado</span>`); }
    } else if (cmd==="N") { currentTrack=(currentTrack+1)%PLAYLIST.length; await playTrack(currentTrack); }
    else if (cmd==="B") { currentTrack=(currentTrack-1+PLAYLIST.length)%PLAYLIST.length; await playTrack(currentTrack); }
    else done=true;
  }
}
async function playTrack(idx) {
  currentTrack=idx; const t=PLAYLIST[idx];
  audioPlayer.src=t.src;
  try { await audioPlayer.play(); musicPlaying=true; await print(`<span class="success">▶ ${t.title}</span>`); }
  catch(e) { await print(`<span class="error">⚠ Interactúa con la página primero para reproducir audio.</span>`); }
}

// 6. ENCRIPTADOR
async function cmdEncrypt() {
  await print(`<span class="dim">[ CRIPTO ] Módulo de encriptación</span>`);
  await print(`<span class="dim">  Modo: [1] Encriptar  [2] Desencriptar</span>`);
  const mode = (await getInput("Modo: ")).trim();
  await print(`<span class="dim">  Algoritmo: [1] Base64  [2] ROT13  [3] César (+13)</span>`);
  const algoIn = (await getInput("Algoritmo: ")).trim();
  await print(`<span class="dim">Texto a procesar:</span>`);
  const texto = await getInput(">> ");
  const algo = algoIn==="1"?"base64":algoIn==="2"?"rot13":"cesar";
  let resultado = "";
  if (algo==="base64") {
    try { resultado = mode==="1" ? btoa(unescape(encodeURIComponent(texto))) : decodeURIComponent(escape(atob(texto))); }
    catch(e) { resultado = "ERROR: texto no válido para decodificar"; }
  } else {
    const shift = algo==="rot13" ? 13 : (mode==="1" ? 13 : -13);
    resultado = texto.replace(/[a-zA-Z]/g, c => {
      const base = c<="Z" ? 65 : 97;
      return String.fromCharCode(((c.charCodeAt(0)-base+shift+26)%26)+base);
    });
  }
  await print(`<br><span class="dim">── RESULTADO ─────────────────────────────────────</span>`);
  await print(`<span class="bright">${resultado}</span>`);
  await print(`<span class="dim">──────────────────────────────────────────────────</span>`);
  await print(`<span class="success">✔ [${algo.toUpperCase()} ${mode==="1"?"CIFRADO":"DESCIFRADO"}]</span>`);
}

// 9. MINIJUEGO
async function cmdMinigame() {
  await print(`<span class="dim">[ GAME ] HACKEO SIMULADO</span>`);
  await print(`<span class="dim">Encuentra las 4 celdas con el código secreto. ${8} intentos.</span>`);
  const SECRET = Array.from({length:4},()=>Math.floor(Math.random()*9)+1);
  const pool = [];
  for(let i=1;i<=9;i++) for(let j=0;j<8;j++) pool.push(i);
  SECRET.forEach(n=>pool.push(n));
  pool.sort(()=>Math.random()-.5);
  const found=[false,false,false,false];
  let tries=0; const MAX=8;
  const statusDiv = addLine(`<span class="dim">Intentos: <span id="tc">0</span>/${MAX} — Encontrados: <span id="fc">0</span>/4</span>`);
  const codeDiv   = addLine(`<span class="dim">Código: [ <span id="cd">? ? ? ?</span> ]</span>`);
  const grid = document.createElement("div"); grid.className="hack-grid";
  pool.slice(0,32).forEach(n=>{
    const cell=document.createElement("div"); cell.className="hack-cell"; cell.textContent="?"; cell.dataset.val=n;
    cell.addEventListener("click",()=>{
      if(cell.classList.contains("hit")||cell.classList.contains("miss")) return;
      tries++; document.getElementById("tc").textContent=tries;
      const si=SECRET.findIndex((s,i)=>s===n&&!found[i]);
      if(si!==-1){
        found[si]=true; cell.classList.add("hit"); cell.textContent=n;
        document.getElementById("fc").textContent=found.filter(Boolean).length;
        document.getElementById("cd").textContent=found.map((f,i)=>f?SECRET[i]:"?").join(" ");
        if(found.every(Boolean)) statusDiv.innerHTML=`<span class="success">✔ HACKEADO — Código: ${SECRET.join("-")} — Intentos: ${tries}</span>`;
      } else {
        cell.classList.add("miss"); cell.textContent=n;
        if(tries>=MAX&&!found.every(Boolean)){
          statusDiv.innerHTML=`<span class="error">✖ FALLIDO — El código era: ${SECRET.join("-")}</span>`;
          grid.querySelectorAll(".hack-cell").forEach(c=>{c.classList.add("miss");c.textContent=c.dataset.val;});
        }
      }
    });
    grid.appendChild(cell);
  });
  terminal.appendChild(grid); terminal.scrollTop=terminal.scrollHeight;
  await print(`<span class="dim">Presiona ENTER para continuar cuando termines...</span>`);
  await getInput("");
}
