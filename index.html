<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ABRAHAM ROOT SYSTEM</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

/* MATRIX CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* TERMINAL */
#terminal {
  position: relative;
  z-index: 2;
  padding: 20px;
  height: 100vh;
  overflow-y: auto;
}

/* INPUT */
input {
  background: black;
  border: none;
  color: #00ff00;
  font-family: monospace;
  outline: none;
}

/* BLINK */
.blink {
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* SCAN EFFECT */
.scan {
  position: fixed;
  width: 100%;
  height: 2px;
  background: #00ff00;
  animation: scan 2s linear infinite;
  z-index: 1;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<div class="scan"></div>
<div id="terminal"></div>

<script>
// MATRIX EFFECT
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++) drops[x] = 1;

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0f0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(drawMatrix, 33);

// TERMINAL
let terminal = document.getElementById("terminal");

function escribir(texto, speed = 20) {
  return new Promise(resolve => {
    let i = 0;
    let interval = setInterval(() => {
      terminal.innerHTML += texto[i];
      i++;
      if (i >= texto.length) {
        clearInterval(interval);
        terminal.innerHTML += "<br>";
        resolve();
      }
    }, speed);
  });
}

async function boot() {
  await escribir("[ BOOTING SYSTEM... ]");
  await escribir("Loading kernel...");
  await escribir("████████████████ 100%");
  await escribir("User: Abraham");
  await escribir("Password required:");

  login();
}

function login() {
  let input = document.createElement("input");
  terminal.appendChild(input);
  input.focus();

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      if (input.value === "XD") {
        terminal.innerHTML += "<br>ACCESS GRANTED ✔<br>";
        input.remove();
        system();
      } else {
        terminal.innerHTML += "<br>ACCESS DENIED ❌<br>";
        input.value = "";
      }
    }
  });
}

async function system() {
  await escribir("Initializing ROOT access...");
  await escribir(`
╔══════════════════════════════╗
║   ABRAHAM ROOT SYSTEM       ║
╚══════════════════════════════╝
`);

  await escribir("Modules loaded:");
  await escribir("[✔] Network");
  await escribir("[✔] Crypto");
  await escribir("[✔] AI");
  await escribir("[✔] Stealth");

  commandLine();
}

function commandLine() {
  terminal.innerHTML += "<br>root@abraham:~$ ";
  
  let input = document.createElement("input");
  terminal.appendChild(input);
  input.focus();

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      let cmd = input.value;
      terminal.innerHTML += cmd + "<br>";
      ejecutar(cmd);
      input.remove();
    }
  });
}

async function ejecutar(cmd) {
  switch(cmd) {
    case "scan":
      await escribir("Scanning network...");
      await escribir("[+] 192.168.1.1 Router");
      await escribir("[+] 192.168.1.5 Phone");
      await escribir("[?] 192.168.1.66 Unknown ⚠");
      break;

    case "hack":
      await escribir("Bypassing security...");
      await escribir("███████░░░ 70%");
      await escribir("ACCESS OVERRIDE ✔");
      break;

    case "clear":
      terminal.innerHTML = "";
      break;

    case "help":
      await escribir("Commands:");
      await escribir("scan | hack | clear | help");
      break;

    default:
      await escribir("Command not found");
  }

  commandLine();
}

boot();
</script>

</body>
</html>
