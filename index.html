<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ABRAHAM GOD SYSTEM</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
}

#terminal {
  padding: 10px;
  height: 100vh;
  overflow-y: auto;
}

input {
  background: black;
  border: none;
  color: #00ff00;
  outline: none;
}

#map {
  width: 100%;
  height: 300px;
  margin-top: 10px;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}

td, th {
  border: 1px solid #00ff00;
  padding: 5px;
}
</style>
</head>

<body>

<div id="terminal"></div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
let terminal = document.getElementById("terminal");

function escribir(texto){
  return new Promise(resolve=>{
    terminal.innerHTML += texto + "<br>";
    setTimeout(resolve, 200);
  });
}

async function inicio(){
  await escribir("BOOTING...");
  await escribir("████████████ 100%");
  await escribir("USER: Abraham");
  await escribir("PASSWORD:");
  login();
}

function login(){
  let input=document.createElement("input");
  terminal.appendChild(input);
  input.focus();

  input.addEventListener("keydown", function(e){
    if(e.key==="Enter"){
      if(input.value==="XD"){
        terminal.innerHTML+="<br>ACCESS GRANTED ✔<br>";
        input.remove();
        menu();
      } else {
        terminal.innerHTML+="<br>ACCESS DENIED ❌<br>";
      }
    }
  });
}

async function menu(){
  await escribir(`
╔══════════════════════════╗
║  ABRAHAM GOD SYSTEM      ║
╚══════════════════════════╝

1) 🌍 Google Maps rastreo
2) 📡 Interceptar señal
3) 💾 Base de datos
4) 🎵 Música ON/OFF
5) 🧹 Limpiar
`);
  seleccionar();
}

function seleccionar(){
  let input=document.createElement("input");
  terminal.appendChild(input);
  input.focus();

  input.addEventListener("keydown", function(e){
    if(e.key==="Enter"){
      let op=input.value;
      input.remove();
      ejecutar(op);
    }
  });
}

async function ejecutar(op){

  if(op=="1"){
    await escribir("Rastreando ubicación...");

    let mapDiv = document.createElement("div");
    mapDiv.id="map";
    terminal.appendChild(mapDiv);

    let script = document.createElement("script");
    script.src = "https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap";
    document.body.appendChild(script);

    window.initMap = function(){
      let loc = {lat:25.6866, lng:-100.3161};
      let map = new google.maps.Map(mapDiv, {
        zoom: 13,
        center: loc
      });

      new google.maps.Marker({
        position: loc,
        map: map
      });
    }
  }

  if(op=="2"){
    await escribir("Interceptando señal...");
    await escribir("Decodificando...");
    await escribir("> Mensaje capturado 📡");
  }

  if(op=="3"){
    await escribir("Cargando base de datos...");

    function crearTabla(nombre){
      let table = document.createElement("table");
      let header = "<tr><th>Nombre</th><th>Ciudad</th><th>País</th><th>Instagram</th></tr>";
      table.innerHTML = header;

      let nombres = ["Juan","Ana","Luis","Carlos","Sofia","Emma","Noah","Liam","Mia","Lucas"];

      for(let i=0;i<10;i++){
        let row = `<tr>
          <td>${nombres[i]} ${i}</td>
          <td>Ciudad ${i}</td>
          <td>País ${i}</td>
          <td>@user${i}</td>
        </tr>`;
        table.innerHTML += row;
      }

      terminal.appendChild(document.createElement("br"));
      terminal.appendChild(table);
    }

    crearTabla("A");
    crearTabla("B");
    crearTabla("C");
  }

  if(op=="4"){
    let music=document.getElementById("music");
    if(music.paused){
      music.play();
      await escribir("🎵 Música ON");
    } else {
      music.pause();
      await escribir("🎵 Música OFF");
    }
  }

  if(op=="5"){
    terminal.innerHTML="";
  }

  menu();
}

inicio();
</script>

</body>
</html>
